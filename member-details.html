<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Member Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body class="page-app">
  <div class="app-shell">
    <header class="page-header">
      <button type="button" onclick="history.back()" class="btn-back">← Back</button>
      <div class="page-header-text">
        <h1 class="page-title">Member Bill Details</h1>
        <p class="page-subtitle" id="memberInfo">Loading member information...</p>
      </div>
    </header>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-icon">🧾</div>
        <h2 class="panel-title">Add Bill</h2>
      </div>
      <form id="billForm" class="row g-3">
        <div class="col-md-4">
          <label class="form-label-modern" for="billYear">Year / Date</label>
          <input type="date" id="billYear" class="form-control-modern" required>
        </div>
        <div class="col-md-4">
          <label class="form-label-modern" for="billMonth">Month</label>
          <input type="text" id="billMonth" class="form-control-modern" placeholder="e.g. November" required>
        </div>
        <div class="col-md-4">
          <label class="form-label-modern" for="billNo">Bill No.</label>
          <input type="text" id="billNo" class="form-control-modern" placeholder="Bill number" required>
        </div>
        <div class="col-12">
          <button type="submit" class="btn-primary-modern">Add Bill</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-icon">📋</div>
        <h2 class="panel-title">Bills</h2>
      </div>
      <div class="table-modern-wrap">
        <table class="table-modern table-modern-responsive">
          <thead>
            <tr>
              <th scope="col">Year</th>
              <th scope="col">Month</th>
              <th scope="col">Bill No.</th>
              <th scope="col">Action</th>
            </tr>
          </thead>
          <tbody id="billTableBody">
            <tr><td colspan="4" class="table-empty">No bill records found.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/member-details.js"></script>
</body>
</html>
