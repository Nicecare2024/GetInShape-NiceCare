<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- Mobile Responsive -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

  <div class="mb-4">
    <button onclick="history.back()" class="btn btn-outline-secondary">
      ← Back
    </button>
  </div>

  <h2 class="mb-3">Add Payment</h2>
  <form id="paymentForm" class="row g-3 mb-4">
    <div class="col-md-3 col-sm-6"><input class="form-control" id="name" placeholder="Name" required></div>
    <div class="col-md-3 col-sm-6"><input class="form-control" id="phone" placeholder="Phone Number" required></div>
    <div class="col-md-2 col-sm-6"><input type="date" class="form-control" id="date" required></div>
    <div class="col-md-2 col-sm-6"><input class="form-control" id="month" placeholder="Month (e.g. April)" required></div>
    <div class="col-md-2 col-sm-6"><input type="number" class="form-control" id="amount" placeholder="Amount" required></div>
    <div class="col-12"><button class="btn btn-primary w-100" type="submit">Add Payment</button></div>
  </form>

  <div class="row mb-3">
    <div class="col-md-4 col-sm-8 mb-2">
      <input type="text" id="searchPhone" class="form-control" placeholder="Search by Phone Number">
    </div>
    <div class="col-md-2 col-sm-4 mb-2">
      <button class="btn btn-outline-primary w-100" onclick="searchPayment()">Search</button>
    </div>
    <div class="col-md-2 col-sm-4 mb-2">
      <button class="btn btn-outline-secondary w-100" onclick="loadPayments()">Clear</button>
    </div>
  </div>

  <h4 class="mb-3">Payment Records</h4>
  <div class="table-responsive">
    <table class="table table-bordered table-striped align-middle text-center">
      <thead class="table-dark">
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Date</th>
          <th>Month</th>
          <th>Amount (₹)</th>
        </tr>
      </thead>
      <tbody id="paymentTableBody"></tbody>
    </table>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB-nxvyQIV6TRs60cmFjB7hplCwgY8SwEI",
      authDomain: "e-data-6ca63.firebaseapp.com",
      projectId: "e-data-6ca63",
      storageBucket: "e-data-6ca63.appspot.com",
      messagingSenderId: "76571848548",
      appId: "1:76571848548:web:fa52ee1a390e7d49031471"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Add payment
    document.getElementById("paymentForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payment = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        date: document.getElementById("date").value,
        month: document.getElementById("month").value,
        amount: document.getElementById("amount").value
      };
      await db.collection("payments").add(payment);
      e.target.reset();
      loadPayments();
    });

    // Load all payments
    async function loadPayments() {
      const snapshot = await db.collection("payments").get();
      displayPayments(snapshot);
    }

    // Display in table format
    function displayPayments(snapshot) {
      const tbody = document.getElementById("paymentTableBody");
      tbody.innerHTML = "";
      snapshot.forEach(doc => {
        const data = doc.data();
        const row = `
          <tr>
            <td>${data.name}</td>
            <td>${data.phone}</td>
            <td>${data.date}</td>
            <td>${data.month}</td>
            <td>₹${data.amount}</td>
          </tr>
        `;
        tbody.innerHTML += row;
      });
    }

    // Search by phone
    async function searchPayment() {
      const phone = document.getElementById("searchPhone").value.trim();
      if (!phone) return;
      const snapshot = await db.collection("payments").where("phone", "==", phone).get();
      displayPayments(snapshot);
    }

    // Initial load
    window.onload = loadPayments;
  </script>
</body>
</html>
