<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body class="page-app">

  <div class="app-shell">
    <header class="page-header">
      <button type="button" onclick="history.back()" class="btn-back">← Back</button>
      <div class="page-header-text">
        <h1 class="page-title">Payment Tracker</h1>
        <p class="page-subtitle">Record and search member payments</p>
      </div>
    </header>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-icon">💳</div>
        <h2 class="panel-title">Add Payment</h2>
      </div>
      <form id="paymentForm" class="row g-3">
        <div class="col-md-6 col-lg-4">
          <label class="form-label-modern" for="name">Name</label>
          <input type="text" class="form-control-modern" id="name" placeholder="Member name" required>
        </div>
        <div class="col-md-6 col-lg-4">
          <label class="form-label-modern" for="phone">Phone</label>
          <input type="tel" class="form-control-modern" id="phone" placeholder="Phone number" required>
        </div>
        <div class="col-md-6 col-lg-4">
          <label class="form-label-modern" for="date">Date</label>
          <input type="date" class="form-control-modern" id="date" required>
        </div>
        <div class="col-md-6 col-lg-4">
          <label class="form-label-modern" for="month">Month</label>
          <input type="text" class="form-control-modern" id="month" placeholder="e.g. April" required>
        </div>
        <div class="col-md-6 col-lg-4">
          <label class="form-label-modern" for="amount">Amount (₹)</label>
          <input type="number" class="form-control-modern" id="amount" placeholder="Amount" required>
        </div>
        <div class="col-12">
          <button type="submit" class="btn-primary-modern w-100">Add Payment</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-icon">🔍</div>
        <h2 class="panel-title">Search Payments</h2>
      </div>
      <div class="row g-3 align-items-end">
        <div class="col-md-6 col-lg-5">
          <label class="form-label-modern" for="searchPhone">Phone number</label>
          <input type="text" id="searchPhone" class="form-control-modern" placeholder="Search by phone…">
        </div>
        <div class="col-6 col-md-3 col-lg-2 d-grid">
          <button type="button" class="btn-outline-modern" onclick="searchPayment()">Search</button>
        </div>
        <div class="col-6 col-md-3 col-lg-2 d-grid">
          <button type="button" class="btn-ghost-modern" onclick="loadPayments()">Clear</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-icon">📋</div>
        <h2 class="panel-title">Payment Records</h2>
      </div>
      <div class="table-modern-wrap">
        <table class="table-modern">
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Date</th>
              <th>Month</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody id="paymentTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    const db = window.db;

    document.getElementById("paymentForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payment = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        date: document.getElementById("date").value,
        month: document.getElementById("month").value,
        amount: document.getElementById("amount").value
      };
      await db.collection("payments").add(payment);
      e.target.reset();
      loadPayments();
    });

    async function loadPayments() {
      const snapshot = await db.collection("payments").get();
      displayPayments(snapshot);
    }

    function displayPayments(snapshot) {
      const tbody = document.getElementById("paymentTableBody");
      tbody.innerHTML = "";

      if (snapshot.empty) {
        tbody.innerHTML = '<tr><td colspan="5" class="table-empty">No payment records found.</td></tr>';
        return;
      }

      snapshot.forEach(doc => {
        const data = doc.data();
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${data.name}</td>
          <td>${data.phone}</td>
          <td>${data.date}</td>
          <td>${data.month}</td>
          <td class="amount-cell">₹${data.amount}</td>
        `;
        tbody.appendChild(row);
      });
    }

    async function searchPayment() {
      const phone = document.getElementById("searchPhone").value.trim();
      if (!phone) return;
      const snapshot = await db.collection("payments").where("phone", "==", phone).get();
      displayPayments(snapshot);
    }

    window.onload = loadPayments;
  </script>
</body>
</html>
