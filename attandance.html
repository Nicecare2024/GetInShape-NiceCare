<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Member Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">

    <div class="mb-4">
        <button onclick="history.back('index.html')" class="btn btn-outline-secondary">
          ← Back
        </button>
      </div>
    <h2 class="text-center mb-4">Member Attendance</h2>

    <form id="attendanceForm" class="row g-3" name="AttendanceForm">
      <div class="col-md-4">
        <input type="text" class="form-control" id="name" name="name" placeholder="Member Name" required>
      </div>
      <div class="col-md-4">
        <input type="date" class="form-control" id="date" name="date" required>
      </div>
      <div class="col-md-4">
        <input type="time" class="form-control" id="enterTime" name="enterTime" required>
      </div>
      <div class="col-12 text-center">
        <input type="submit" value="Submit Attandance" class="btn btn-primary">
      </div>
    </form>
  </div>

  <script>
    // Set today's date on focus
    const dateInput = document.getElementById('date');
    dateInput.addEventListener('focus', () => {
      const today = new Date().toISOString().split('T')[0];
      dateInput.value = today;
    });

    const scriptURL = 'https://script.google.com/macros/s/AKfycbyWeIrXwSEo-SKUE1Gw4hPxjMzV6X8QI0EjozuhK3Ldft2t_d3SfZvbjtQubv7Z8QpDlA/exec'
      const form = document.forms['AttendanceForm']
    
      form.addEventListener('submit', e => {
        e.preventDefault()
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
          .then(response => alert("Attandance Submitted"))
          .catch(error => console.error('Error!', error.message))
      })
  </script>
</body>
</html>
