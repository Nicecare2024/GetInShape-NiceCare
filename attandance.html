<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Member Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body class="page-app">

  <div class="app-shell">
    <header class="page-header">
      <button type="button" onclick="history.back()" class="btn-back">← Back</button>
      <div class="page-header-text">
        <h1 class="page-title">Member Attendance</h1>
        <p class="page-subtitle">Log daily check-ins for gym members</p>
      </div>
    </header>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-icon">✅</div>
        <h2 class="panel-title">Submit Attendance</h2>
      </div>
      <form id="attendanceForm" class="row g-3" name="AttendanceForm">
        <div class="col-md-4">
          <label class="form-label-modern" for="name">Member Name</label>
          <input type="text" class="form-control-modern" id="name" name="name" placeholder="Enter name" required>
        </div>
        <div class="col-md-4">
          <label class="form-label-modern" for="date">Date</label>
          <input type="date" class="form-control-modern" id="date" name="date" required>
        </div>
        <div class="col-md-4">
          <label class="form-label-modern" for="enterTime">Check-in Time</label>
          <input type="time" class="form-control-modern" id="enterTime" name="enterTime" required>
        </div>
        <div class="col-12">
          <button type="submit" class="btn-primary-modern w-100">Submit Attendance</button>
        </div>
      </form>
      <div id="submitFeedback" class="submit-feedback is-success" role="status" aria-live="polite"></div>
    </section>
  </div>

  <script>
    const dateInput = document.getElementById("date");
    dateInput.addEventListener("focus", () => {
      const today = new Date().toISOString().split("T")[0];
      dateInput.value = today;
    });

    const scriptURL = "https://script.google.com/macros/s/AKfycbyWeIrXwSEo-SKUE1Gw4hPxjMzV6X8QI0EjozuhK3Ldft2t_d3SfZvbjtQubv7Z8QpDlA/exec";
    const form = document.forms["AttendanceForm"];
    const feedback = document.getElementById("submitFeedback");

    form.addEventListener("submit", e => {
      e.preventDefault();
      feedback.classList.remove("is-visible");
      fetch(scriptURL, { method: "POST", body: new FormData(form) })
        .then(() => {
          feedback.textContent = "Attendance submitted successfully.";
          feedback.classList.add("is-visible");
          form.reset();
        })
        .catch(error => {
          feedback.textContent = "Something went wrong. Please try again.";
          feedback.classList.add("is-visible");
          console.error("Error!", error.message);
        });
    });
  </script>
</body>
</html>
